name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python scripts/extract_prices.py

      - name: Retrain Prophet forecast
        env:
          NEO4J_URI:      ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: python scripts/train_prophet.py

      - name: Update risk scores
        env:
          NEO4J_URI:        ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME:   ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD:   ${{ secrets.NEO4J_PASSWORD }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: python scripts/update_risk_scores.py
